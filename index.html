<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Financeiro — Engehall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#004F92;--azul-claro:#0079D2;--laranja:#E05C16;--laranja-vivo:#FA9E00;
  --branco:#fff;--cinza-bg:#f4f5f7;--cinza-borda:#dde1e7;
  --cinza-text:#4a5568;--cinza-muted:#8a94a6;--text-dark:#1a202c;
}
body{font-family:'Poppins',sans-serif;background:var(--cinza-bg);color:var(--text-dark);min-height:100vh;font-size:14px}
header{background:var(--azul);position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,79,146,.35)}
.header-inner{max-width:1280px;margin:0 auto;padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between}
.header-brand{display:flex;align-items:center;gap:14px}
.brand-name{font-size:17px;font-weight:700;color:#fff}
.brand-sub{font-size:11px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.04em}
.hdr-btns{display:flex;gap:8px}
.btn-hdr{display:flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;color:rgba(255,255,255,.85);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:7px 14px;cursor:pointer;transition:.15s}
.btn-hdr:hover{background:rgba(255,255,255,.22);color:#fff}
.btn-hdr.laranja{background:var(--laranja);border-color:var(--laranja);color:#fff}
.btn-hdr.laranja:hover{background:#c94f10}
.accent-bar{height:3px;background:linear-gradient(90deg,var(--laranja),var(--laranja-vivo))}
main{max-width:1280px;margin:0 auto;padding:1.5rem 2rem 4rem}

/* Search bar */
.search-wrap{position:relative;margin-bottom:1.25rem}
.search-input{width:100%;padding:10px 16px 10px 40px;font-family:'Poppins',sans-serif;font-size:13px;border:1.5px solid var(--cinza-borda);border-radius:10px;background:#fff;color:var(--text-dark);outline:none;transition:.15s}
.search-input:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(0,79,146,.1)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--cinza-muted);pointer-events:none}
.search-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--cinza-muted);display:none;font-size:18px;line-height:1;padding:2px}
.search-clear.visible{display:block}
.search-results{background:#fff;border:1.5px solid var(--azul);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:none}
.search-results.visible{display:block}
.search-results-title{font-size:12px;font-weight:600;color:var(--azul);margin-bottom:10px}
.search-result-item{padding:8px 0;border-bottom:1px solid var(--cinza-borda);display:flex;align-items:flex-start;gap:10px}
.search-result-item:last-child{border-bottom:none;padding-bottom:0}
.sri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.sri-info{flex:1}
.sri-title{font-size:12px;font-weight:600;color:var(--text-dark)}
.sri-meta{font-size:11px;color:var(--cinza-muted);margin-top:2px}
.sri-badge{font-size:10px;font-weight:600;padding:1px 8px;border-radius:10px;margin-left:6px;vertical-align:middle}

/* Controls */
.controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:12px}
.nav-group{display:flex;align-items:center;gap:10px}
.nav-btn{width:38px;height:38px;background:#fff;border:1.5px solid var(--cinza-borda);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--azul);transition:.15s}
.nav-btn:hover{border-color:var(--azul);box-shadow:0 0 0 3px rgba(0,79,146,.1)}
.nav-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.month-label{font-size:20px;font-weight:700;color:var(--azul);min-width:210px;text-align:center}
.today-btn{font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;background:#fff;border:1.5px solid var(--cinza-borda);border-radius:8px;padding:8px 18px;cursor:pointer;color:var(--azul);letter-spacing:.06em;text-transform:uppercase;transition:.15s}
.today-btn:hover{border-color:var(--azul);background:rgba(0,79,146,.05)}

/* Filter rows */
.filter-section{background:#fff;border:1px solid var(--cinza-borda);border-radius:10px;padding:12px 16px;margin-bottom:1.25rem}
.filter-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.filter-row+.filter-row{margin-top:8px;padding-top:8px;border-top:1px solid var(--cinza-borda)}
.filters-label{font-size:10px;font-weight:700;color:var(--cinza-muted);text-transform:uppercase;letter-spacing:.07em;min-width:90px}
.filter-chip{display:flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;transition:.15s}
.filter-chip .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.filter-chip.off{opacity:.3;filter:grayscale(.8)}

/* Calendar */
.week-header{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.week-header div{font-size:11px;font-weight:700;color:var(--azul);text-align:center;text-transform:uppercase;letter-spacing:.06em;padding:6px 0}
.week-header div:first-child,.week-header div:last-child{color:var(--cinza-muted)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cell{background:#fff;border:1px solid var(--cinza-borda);border-radius:8px;padding:8px;min-height:100px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .1s;position:relative;overflow:hidden}
.cell::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:transparent;border-radius:8px 8px 0 0}
.cell.has-tasks::before{background:var(--azul-claro)}
.cell.has-manual::before{background:var(--laranja)}
.cell:hover:not(.ghost):not(.weekend-cell){border-color:var(--azul);box-shadow:0 4px 16px rgba(0,79,146,.12);transform:translateY(-1px)}
.cell.ghost{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.cell.weekend-cell{background:#f9fafb;cursor:default}
.cell.weekend-cell::before{display:none}
.cell.today-cell{border-color:var(--laranja);border-width:2px;box-shadow:0 0 0 3px rgba(224,92,22,.12)}
.cell.today-cell::before{background:var(--laranja)}
.day-num{font-size:13px;font-weight:600;color:var(--cinza-muted);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.day-num.is-today{color:var(--laranja)}
.today-badge{font-size:9px;font-weight:700;background:var(--laranja);color:#fff;border-radius:10px;padding:1px 7px;text-transform:uppercase}
.pills{display:flex;flex-direction:column;gap:3px}
.pill{font-size:10px;font-weight:500;padding:3px 7px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.pill.manual-pill{background:#fff3e0;color:#7c3000;border:1px dashed #E05C16}
.more-lbl{font-size:10px;font-weight:600;color:var(--azul);margin-top:2px;padding-left:2px}
.empty-lbl{font-size:10px;color:var(--cinza-muted);margin-top:4px}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(10,20,40,.55);z-index:100;align-items:center;justify-content:center;padding:24px 16px;backdrop-filter:blur(3px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:580px;max-height:87vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:popIn .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{background:var(--azul);padding:1.25rem 1.5rem 1rem;border-radius:14px 14px 0 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:2}
.modal-date{font-size:15px;font-weight:700;color:#fff;text-transform:capitalize}
.modal-date-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.modal-close{width:30px;height:30px;flex-shrink:0;background:rgba(255,255,255,.15);border:none;border-radius:50%;cursor:pointer;color:rgba(255,255,255,.8);font-size:18px;font-family:'Poppins',sans-serif;display:flex;align-items:center;justify-content:center;transition:.15s}
.modal-close:hover{background:rgba(255,255,255,.28);color:#fff}
.modal-orange-bar{height:3px;background:linear-gradient(90deg,var(--laranja),var(--laranja-vivo))}
.modal-body{padding:1.25rem 1.5rem 1.5rem;display:flex;flex-direction:column;gap:10px}
.task-card{border:1px solid var(--cinza-borda);border-radius:10px;overflow:hidden;transition:box-shadow .15s}
.task-card:hover{box-shadow:0 2px 10px rgba(0,79,146,.1)}
.task-card.manual-card{border-color:#fbbf24;border-style:dashed}
.task-card-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:#fafbfd;transition:background .15s}
.task-card-header:hover{background:#f0f4fa}
.task-card.manual-card .task-card-header{background:#fffbeb}
.task-left-bar{width:4px;height:36px;border-radius:4px;flex-shrink:0}
.task-title{font-size:13px;font-weight:600;color:var(--text-dark);flex:1;line-height:1.3}
.task-badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:10px;white-space:nowrap}
.task-chevron{color:var(--cinza-muted);transition:transform .2s;flex-shrink:0}
.task-chevron svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:block}
.task-card.expanded .task-chevron{transform:rotate(180deg)}
.task-card-body{display:none;padding:0 14px 14px 28px;border-top:1px solid var(--cinza-borda);background:#fff}
.task-card.expanded .task-card-body{display:block}
.task-card.manual-card .task-card-body{background:#fffbeb}
.task-meta-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.meta-chip{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--cinza-text);background:#f0f4fa;border:1px solid #dde6f5;border-radius:20px;padding:4px 11px}
.meta-chip svg{width:12px;height:12px;stroke:var(--azul);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.task-desc{font-size:12px;color:var(--cinza-text);line-height:1.75}
.delete-btn{margin-top:10px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:5px 12px;cursor:pointer;transition:.15s}
.delete-btn:hover{background:#fee2e2}
.process-btn{display:inline-flex;align-items:center;gap:7px;margin-top:12px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;color:#fff;background:var(--azul);border:none;border-radius:8px;padding:8px 16px;cursor:pointer;text-decoration:none;transition:.15s}
.process-btn:hover{background:var(--azul-claro);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,79,146,.25)}
.process-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* Add task modal */
.add-modal-bg{display:none;position:fixed;inset:0;background:rgba(10,20,40,.55);z-index:200;align-items:center;justify-content:center;padding:24px 16px;backdrop-filter:blur(3px)}
.add-modal-bg.open{display:flex}
.add-modal{background:#fff;border-radius:14px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:popIn .2s cubic-bezier(.34,1.56,.64,1)}
.add-modal-header{background:var(--laranja);padding:1.25rem 1.5rem 1rem;border-radius:14px 14px 0 0;display:flex;align-items:center;justify-content:space-between}
.add-modal-title{font-size:15px;font-weight:700;color:#fff}
.add-modal-body{padding:1.5rem}
.form-group{margin-bottom:1rem}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-dark);margin-bottom:5px}
.form-input,.form-textarea,.form-select{width:100%;font-family:'Poppins',sans-serif;font-size:13px;border:1.5px solid var(--cinza-borda);border-radius:8px;padding:9px 12px;color:var(--text-dark);outline:none;transition:.15s;background:#fff}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(0,79,146,.1)}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;margin-top:1.25rem}
.btn-save{flex:1;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;background:var(--laranja);color:#fff;border:none;border-radius:8px;padding:10px;cursor:pointer;transition:.15s}
.btn-save:hover{background:#c94f10}
.btn-cancel{font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;background:var(--cinza-bg);color:var(--cinza-text);border:1.5px solid var(--cinza-borda);border-radius:8px;padding:10px 20px;cursor:pointer;transition:.15s}
.btn-cancel:hover{background:var(--cinza-borda)}

/* Role badges */
.role-coord{background:#e0f2fe;color:#0c4a6e}
.role-assist{background:#f0fdf4;color:#14532d}
.role-estag{background:#faf5ff;color:#581c87}
.role-todos{background:#f1f5f9;color:#334155}

.panel{margin-top:2.5rem}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.panel-title{font-size:16px;font-weight:700;color:var(--azul);display:flex;align-items:center;gap:10px}
.panel-title svg{width:18px;height:18px;stroke:var(--azul);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.panel-legend{display:flex;gap:12px;flex-wrap:wrap}
.pl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--cinza-text)}
.pl-dot{width:8px;height:8px;border-radius:50%}
.panel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.dc{background:#fff;border:1px solid var(--cinza-borda);border-radius:12px;padding:.9rem 1.1rem;display:flex;align-items:flex-start;gap:12px;transition:box-shadow .15s,transform .1s}
.dc:hover{box-shadow:0 4px 16px rgba(0,79,146,.1);transform:translateY(-1px)}
.dc.urgente{border-color:#fca5a5;border-left:4px solid #dc2626}
.dc.proximo{border-color:#fcd34d;border-left:4px solid #b45309}
.dc.ok{border-color:#86efac;border-left:4px solid #16a34a}
.dc.neutro{border-left:4px solid var(--azul-claro)}
.dc-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dc-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.urgente .dc-icon{background:#fee2e2;color:#dc2626}
.proximo .dc-icon{background:#fef9c3;color:#b45309}
.ok .dc-icon{background:#dcfce7;color:#16a34a}
.neutro .dc-icon{background:#dbeafe;color:#1d4ed8}
.dc-body{flex:1;min-width:0}
.dc-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.urgente .dc-tag{color:#dc2626}.proximo .dc-tag{color:#b45309}.ok .dc-tag{color:#16a34a}.neutro .dc-tag{color:#1d4ed8}
.dc-name{font-size:13px;font-weight:600;color:var(--text-dark);line-height:1.3;margin-bottom:3px}
.dc-date{font-size:11px;color:var(--cinza-text)}
.dc-resp{font-size:10px;color:var(--cinza-muted);margin-top:2px}
.dc-right{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0}
.dc-days-num{font-size:24px;font-weight:700;line-height:1}
.urgente .dc-days-num{color:#dc2626}.proximo .dc-days-num{color:#b45309}.ok .dc-days-num{color:#16a34a}.neutro .dc-days-num{color:#1d4ed8}
.dc-days-lbl{font-size:9px;font-weight:600;color:var(--cinza-muted);text-transform:uppercase;letter-spacing:.04em;text-align:right}
@media print{.hdr-btns,.controls,.filter-section,.search-wrap{display:none}.modal-bg,.add-modal-bg{display:none!important}header{position:static;box-shadow:none}.accent-bar{display:none}.cell{break-inside:avoid;min-height:80px}}
@media(max-width:700px){main{padding:1rem 1rem 3rem}.header-inner{padding:0 1rem}.month-label{font-size:15px;min-width:150px}.cell{min-height:70px;padding:5px}.day-num{font-size:11px}.pill{font-size:9px}.week-header div{font-size:9px}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="header-brand">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <polygon points="20,3 36,12 36,28 20,37 4,28 4,12" fill="#0079D2" opacity=".85"/>
        <polygon points="20,3 36,12 36,28 20,37 4,28 4,12" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1.2"/>
        <rect x="13" y="14" width="8" height="8" fill="white" opacity=".92"/>
        <rect x="19" y="19" width="8" height="8" fill="#E05C16"/>
      </svg>
      <div>
        <div class="brand-name">EngeHall</div>
        <div class="brand-sub">Calendário Financeiro · Elétrica & Tech</div>
      </div>
    </div>
    <div class="hdr-btns">
      <button class="btn-hdr laranja" onclick="openAddModal()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        Nova tarefa
      </button>
      <button class="btn-hdr" onclick="window.print()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5V2h8v3M4 11H2V6h12v5h-2M4 9h8v5H4z"/></svg>
        Imprimir
      </button>
    </div>
  </div>
</header>
<div class="accent-bar"></div>

<main>
  <!-- Search -->
  <div class="search-wrap">
    <span class="search-icon"><svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="14" y2="14"/></svg></span>
    <input class="search-input" id="search-input" type="text" placeholder="Pesquisar atividade... (ex: ISS, pagar.me, NF, conciliação)" oninput="doSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
  </div>
  <div class="search-results" id="search-results">
    <div class="search-results-title" id="search-results-title"></div>
    <div id="search-results-body"></div>
  </div>

  <!-- Nav -->
  <div class="controls">
    <div class="nav-group">
      <button class="nav-btn" onclick="changeMonth(-1)"><svg viewBox="0 0 16 16"><polyline points="10 12 6 8 10 4"/></svg></button>
      <div class="month-label" id="month-label"></div>
      <button class="nav-btn" onclick="changeMonth(1)"><svg viewBox="0 0 16 16"><polyline points="6 4 10 8 6 12"/></svg></button>
    </div>
    <button class="today-btn" onclick="goToday()">Hoje</button>
  </div>

  <!-- Filters -->
  <div class="filter-section">
    <div class="filter-row">
      <span class="filters-label">Empresa</span>
      <div id="filters-emp" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>
    <div class="filter-row">
      <span class="filters-label">Cadência</span>
      <div id="filters-cat" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>
    <div class="filter-row">
      <span class="filters-label">Responsável</span>
      <div id="filters-role" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>
  </div>

  <div class="week-header">
    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
  </div>
  <div class="cal-grid" id="grid"></div>

  <!-- Painel de próximos vencimentos -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">
        <svg viewBox="0 0 16 16"><rect x="1" y="3" width="14" height="11" rx="2"/><path d="M1 7h14M5 1v4M11 1v4"/></svg>
        Próximos vencimentos
      </div>
      <div class="panel-legend">
        <span class="pl-item"><span class="pl-dot" style="background:#dc2626"></span>Vence em até 7 dias</span>
        <span class="pl-item"><span class="pl-dot" style="background:#b45309"></span>Vence em até 15 dias</span>

// Tarefas manuais em memória (por sessão)
let manualTasks = [];
let nextManualId = 1000;

const TODAY=new Date(); TODAY.setHours(0,0,0,0);
let cur=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
let activeF=new Set(Object.keys(CATS));
let activeR=new Set(Object.keys(ROLES));
let activeE=new Set(Object.keys(EMPRESAS));

function isUtil(d){return d.getDay()!==0&&d.getDay()!==6}

function isPrimeiroDiaUtil(d){
  const y=d.getFullYear(),m=d.getMonth();
  for(let i=1;i<=5;i++){
    const t=new Date(y,m,i);
    if(isUtil(t)) return d.getDate()===i;
  }
  return false;
}

function getTasksFor(date){
  const auto = TASKS.filter(t=>activeF.has(t.cat)&&activeR.has(t.role)&&activeE.has(t.empresa||'eletrica')&&t.rule(date));
  const manual = manualTasks.filter(t=>{
    const td=new Date(t.date+'T12:00:00');
    return td.toDateString()===date.toDateString() && activeR.has(t.role) && activeE.has(t.empresa||'eletrica');
  });
  return [...auto,...manual];
}

// ── Build filters ──
function buildUI(){
  const fe=document.getElementById('filters-emp');
  const fc=document.getElementById('filters-cat');
  const fr=document.getElementById('filters-role');

  for(const[k,v]of Object.entries(EMPRESAS)){
    const b=document.createElement('button');
    b.className='filter-chip';
    b.innerHTML=`<span class="dot" style="background:${v.dot}"></span>${v.label}`;
    setChipStyle(b,v,true);
    b.onclick=()=>{const on=activeE.has(k);if(on)activeE.delete(k);else activeE.add(k);setChipStyle(b,v,!on);render();renderDeadlines()};
    fe.appendChild(b);
  }

  for(const[k,v]of Object.entries(CATS)){
    const b=document.createElement('button');
    b.className='filter-chip';b.dataset.key=k;b.dataset.type='cat';
    b.innerHTML=`<span class="dot" style="background:${v.dot}"></span>${v.label}`;
    setChipStyle(b,v,true);
    b.onclick=()=>{const on=activeF.has(k);if(on)activeF.delete(k);else activeF.add(k);setChipStyle(b,v,!on);render()};
    fc.appendChild(b);
  }

  for(const[k,v]of Object.entries(ROLES)){
    const b=document.createElement('button');
    b.className='filter-chip';b.dataset.key=k;b.dataset.type='role';
    b.innerHTML=`<span class="dot" style="background:${v.dot}"></span>${v.label}`;
    setChipStyle(b,v,true);
    b.onclick=()=>{const on=activeR.has(k);if(on)activeR.delete(k);else activeR.add(k);setChipStyle(b,v,!on);render()};
    fr.appendChild(b);
  }
}

function setChipStyle(b,v,on){
  b.style.background=on?v.bg:'transparent';
  b.style.color=on?v.text:'var(--cinza-muted)';
  b.style.borderColor=on?v.dot:'var(--cinza-borda)';
  b.classList.toggle('off',!on);
}

// ── Search ──
function doSearch(q){
  const sq=q.trim().toLowerCase();
  const clear=document.getElementById('search-clear');
  const box=document.getElementById('search-results');
  const body=document.getElementById('search-results-body');
  const title=document.getElementById('search-results-title');
  clear.classList.toggle('visible',sq.length>0);
  if(!sq){box.classList.remove('visible');return}

  const allTasks=[...TASKS,...manualTasks.map(t=>({...t,cat:'manual',role:t.role}))];
  const results=allTasks.filter(t=>{
    const hay=(t.title+' '+(t.desc||'')+' '+(t.resp||'')+' '+(t.freq||'')).toLowerCase();
    return hay.includes(sq);
  });

  body.innerHTML='';
  if(results.length===0){
    body.innerHTML='<div style="font-size:12px;color:var(--cinza-muted);padding:4px 0">Nenhuma atividade encontrada.</div>';
    title.textContent='Pesquisa: "'+q+'"';
  } else {
    title.textContent=`${results.length} atividade${results.length>1?'s':''} encontrada${results.length>1?'s':''} para "${q}"`;
    results.forEach(t=>{
      const isManual=t.id>=1000;
      const v=isManual?{bg:'#fff3e0',text:'#7c3000',dot:'#E05C16',label:'Manual'}:CATS[t.cat];
      const rv=ROLES[t.role]||ROLES.todos;
      const ev=EMPRESAS[t.empresa||'eletrica']||EMPRESAS.eletrica;
      const div=document.createElement('div');div.className='search-result-item';
      div.innerHTML=`
        <span class="sri-dot" style="background:${ev.dot}"></span>
        <div class="sri-info">
          <div class="sri-title">${t.title}
            <span class="sri-badge" style="background:${ev.bg};color:${ev.text};border:1px solid ${ev.dot}">${ev.label}</span>
            <span class="sri-badge" style="background:${v.bg};color:${v.text}">${v.label||'Manual'}</span>
            <span class="sri-badge" style="background:${rv.bg};color:${rv.text}">${rv.label}</span>
          </div>
          <div class="sri-meta">${t.freq||'Data única'}${isManual&&t.date?' — '+new Date(t.date+'T12:00:00').toLocaleDateString('pt-BR'):''}</div>
        </div>`;
      body.appendChild(div);
    });
  }
  box.classList.add('visible');
}

function clearSearch(){
  document.getElementById('search-input').value='';
  document.getElementById('search-clear').classList.remove('visible');
  document.getElementById('search-results').classList.remove('visible');
}

// ── Render ──
function render(){
  const y=cur.getFullYear(),m=cur.getMonth();
  const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('month-label').textContent=`${MN[m]} ${y}`;
  const grid=document.getElementById('grid');grid.innerHTML='';
  const fd=new Date(y,m,1).getDay(),ld=new Date(y,m+1,0).getDate();

  for(let i=0;i<fd;i++){const c=document.createElement('div');c.className='cell ghost';grid.appendChild(c)}
  for(let d=1;d<=ld;d++){
    const date=new Date(y,m,d),wknd=!isUtil(date),isToday=date.toDateString()===TODAY.toDateString();
    const cell=document.createElement('div');
    cell.className='cell'+(wknd?' weekend-cell':'')+(isToday?' today-cell':'');
    const dn=document.createElement('div');
    dn.className='day-num'+(isToday?' is-today':'');
    dn.innerHTML=d+(isToday?' <span class="today-badge">hoje</span>':'');
    cell.appendChild(dn);
    if(!wknd){
      const tasks=getTasksFor(date);
      const hasManual=tasks.some(t=>t.id>=1000);
      if(tasks.length>0){
        cell.classList.add(hasManual&&tasks.every(t=>t.id>=1000)?'has-manual':'has-tasks');
        const pw=document.createElement('div');pw.className='pills';
        const show=Math.min(tasks.length,3);
        for(let i=0;i<show;i++){
          const t=tasks[i];
          const isM=t.id>=1000;
          const v=isM?{bg:'#fff3e0',text:'#7c3000'}:CATS[t.cat];
          const ev=EMPRESAS[t.empresa||'eletrica']||EMPRESAS.eletrica;
          const p=document.createElement('div');
          p.className='pill'+(isM?' manual-pill':'');
          if(!isM){p.style.background=v.bg;p.style.color=v.text;p.style.borderLeft=`3px solid ${ev.dot}`;}
          p.textContent=t.title;pw.appendChild(p);
        }
        if(tasks.length>3){const ml=document.createElement('div');ml.className='more-lbl';ml.textContent=`+${tasks.length-3} tarefa${tasks.length-3>1?'s':''}`;pw.appendChild(ml)}
        cell.appendChild(pw);cell.onclick=()=>openModal(date,tasks);
      }else{
        const el=document.createElement('div');el.className='empty-lbl';el.textContent='Sem tarefas';cell.appendChild(el);
        cell.style.cursor='default';
      }
      // weekend cells: allow clicking to add manual task
      if(!wknd){
        const origClick=cell.onclick;
        if(!origClick){
          cell.style.cursor='default';
        }
      }
    }
    grid.appendChild(cell);
  }
  const total=fd+ld,rem=total%7===0?0:7-(total%7);
  for(let i=0;i<rem;i++){const c=document.createElement('div');c.className='cell ghost';grid.appendChild(c)}
}

// ── Day modal ──
function openModal(date,tasks){
  const opts={weekday:'long',day:'numeric',month:'long',year:'numeric'};
  document.getElementById('m-date').textContent=date.toLocaleDateString('pt-BR',opts);
  document.getElementById('m-sub').textContent=`${tasks.length} tarefa${tasks.length>1?'s':''} para este dia`;
  const body=document.getElementById('m-body');body.innerHTML='';

  for(const t of tasks){
    const isM=t.id>=1000;
    const v=isM?{bg:'#fff3e0',text:'#7c3000',bar:'#E05C16',label:'Manual'}:CATS[t.cat];
    const rv=ROLES[t.role]||ROLES.todos;
    const ev=EMPRESAS[t.empresa||'eletrica']||EMPRESAS.eletrica;
    const barColor=isM?'#E05C16':ev.bar;
    const card=document.createElement('div');
    card.className='task-card'+(isM?' manual-card':'');
    card.innerHTML=`
      <div class="task-card-header" onclick="toggleCard(this.closest('.task-card'))">
        <div class="task-left-bar" style="background:${barColor}"></div>
        <div class="task-title">${t.title}</div>
        <span class="task-badge" style="background:${ev.bg};color:${ev.text};border:1px solid ${ev.dot}">${ev.label}</span>
        <span class="task-badge" style="background:${v.bg};color:${v.text}">${v.label}</span>
        <span class="task-chevron"><svg viewBox="0 0 16 16"><polyline points="4 6 8 10 12 6"/></svg></span>
      </div>
      <div class="task-card-body">
        <div class="task-meta-row">
          <span class="meta-chip"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>${t.freq||'Tarefa manual'}</span>
          <span class="meta-chip" style="background:${rv.bg};border-color:${rv.dot};color:${rv.text}">
            <svg viewBox="0 0 16 16"><path d="M8 2a4 4 0 100 8 4 4 0 000-8zM2 14c0-2.2 2.7-4 6-4s6 1.8 6 4"/></svg>
            ${t.resp||rv.label}
          </span>
        </div>
        <div class="task-desc">${t.desc||'Sem descrição.'}</div>
        ${t.link?`<a class="process-btn" href="${t.link}" target="_blank" rel="noopener noreferrer"><svg viewBox="0 0 16 16"><path d="M10 2h4v4M14 2l-7 7M6 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1v-3"/></svg>Ver processo completo</a>`:''}
        ${isM?`<button class="delete-btn" onclick="deleteTask(${t.id})">Excluir esta tarefa</button>`:''}
      </div>`;
    body.appendChild(card);
  }
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow='hidden';
}
function toggleCard(card){card.classList.toggle('expanded')}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');document.body.style.overflow=''}
function bgClick(e){if(e.target===document.getElementById('modal-bg'))closeModal()}

// ── Add task modal ──
let addTargetDate=null;
function openAddModal(dateStr){
  const inp=document.getElementById('f-date');
  if(dateStr) inp.value=dateStr;
  else{const t=TODAY;inp.value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`}
  document.getElementById('f-title').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-role').value='coordenacao';
  document.getElementById('add-modal-bg').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeAddModal(){document.getElementById('add-modal-bg').classList.remove('open');document.body.style.overflow=''}
function addBgClick(e){if(e.target===document.getElementById('add-modal-bg'))closeAddModal()}

function saveTask(){
  const date=document.getElementById('f-date').value;
  const title=document.getElementById('f-title').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  const role=document.getElementById('f-role').value;
  const empresa=document.getElementById('f-empresa').value;
  if(!date||!title){alert('Preencha a data e o título da tarefa.');return}
  const rv=ROLES[role];
  manualTasks.push({id:nextManualId++,title,desc,date,role,empresa,resp:rv.label,freq:'Tarefa manual'});
  closeAddModal();
  render();
}

function deleteTask(id){
  if(!confirm('Excluir esta tarefa?')) return;
  manualTasks=manualTasks.filter(t=>t.id!==id);
  closeModal();
  render();
}

function nextDayOfMonth(from, day){
  // This month first, then next
  for(let mo=0; mo<=2; mo++){
    const t=new Date(from.getFullYear(), from.getMonth()+mo, day);
    if(t>from) return t;
  }
}

function nextWeekday(from, dow){
  for(let i=1;i<=7;i++){
    const d=new Date(from); d.setDate(d.getDate()+i);
    if(d.getDay()===dow) return d;
  }
}

function renderDeadlines(){
  const panel=document.getElementById('deadlines-panel');
  const ref=new Date(TODAY);
  const raw=[];

  DEADLINES.forEach(dl=>{
    if(!activeE.has(dl.empresa||'eletrica')) return;
    const next=dl.getNext(ref);
    if(!next) return;
    const diff=Math.round((next-ref)/(1000*60*60*24));
    raw.push({...dl, next, diff});
  });

  // Merge items with same grupo that fall on the same date
  const merged=[];
  const seen={};
  raw.forEach(item=>{
    const key=item.grupo&&item.grupo+':'+item.diff;
    if(item.grupo&&seen[key]){
      // Add this empresa to the existing merged card
      seen[key].empresas.push(item.empresa);
      // Combine resp
      seen[key].respCombined=(seen[key].respCombined||seen[key].resp)+' / '+item.resp;
    } else {
      const entry={...item, empresas:[item.empresa], respCombined:item.resp};
      merged.push(entry);
      if(item.grupo) seen[key]=entry;
    }
  });

  merged.sort((a,b)=>a.diff-b.diff);
  panel.innerHTML='';

  if(merged.length===0){
    panel.innerHTML='<div style="font-size:13px;color:var(--cinza-muted);padding:8px 0">Nenhum vencimento para as empresas selecionadas.</div>';
    return;
  }

  merged.forEach(item=>{
    const {name,icon,next,diff,empresas,respCombined}=item;
    const urgencia=diff<=7?'urgente':diff<=15?'proximo':diff<=30?'ok':'neutro';
    const tagLabel=diff===0?'Hoje!':diff<=7?'Urgente':diff<=15?'Em breve':diff<=30?'Este mês':'Próximos meses';
    const dateStr=next.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short',year:'numeric'});

    // Build empresa badges
    const badgesHTML=empresas.map(emp=>{
      const ev=EMPRESAS[emp]||EMPRESAS.eletrica;
      return `<span style="font-size:9px;font-weight:700;padding:1px 7px;border-radius:10px;background:${ev.bg};color:${ev.text};border:1px solid ${ev.dot};text-transform:uppercase;letter-spacing:.04em">${ev.label}</span>`;
    }).join('');

    // Border color: if both companies, use gradient-like double border (show first empresa color)
    const borderColor=empresas.length>1?'var(--text-dark)':EMPRESAS[empresas[0]].bar;

    const card=document.createElement('div');
    card.className=`dc ${urgencia}`;
    card.style.borderLeftColor=borderColor;
    card.style.borderLeftWidth=empresas.length>1?'5px':'4px';
    card.innerHTML=`
      <div class="dc-icon">${ICONS[icon]||ICONS.doc}</div>
      <div class="dc-body">
        <div class="dc-tag" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
          <span>${tagLabel}</span>
          ${badgesHTML}
        </div>
        <div class="dc-name">${name}</div>
        <div class="dc-date">${dateStr}</div>
        <div class="dc-resp">${respCombined}</div>
      </div>
      <div class="dc-right">
        <div class="dc-days-num">${diff}</div>
        <div class="dc-days-lbl">dias</div>
      </div>`;
    panel.appendChild(card);
  });
}
